server {
    listen 80;
    server_name ru75.alexanderoff.store;
    return 301 https://$host:8444$request_uri;
}
server {
    listen 8444 ssl;
    server_name ru75.alexanderoff.store;
    
    ssl_certificate /etc/letsencrypt/live/ru75.alexanderoff.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru75.alexanderoff.store/privkey.pem;
    
    # Оптимизация SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    
    # Keepalive
    keepalive_timeout 65;
    
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 30;
    }
    
    # Подписка - отдельный location с кешированием
    location /sub/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30;
        proxy_connect_timeout 5;
        add_header Cache-Control "no-cache";
    }
}
